<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
    <link rel="stylesheet" href="./css/common.css" />
    <script type="module" crossorigin src="/goit-js-hw-10/1-timer.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-js-hw-10/assets/iziToast.min-CvFvRQE4.js">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-10/assets/iziToast-DnveWo0P.css">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-10/assets/1-timer-BArvkMiJ.css">
  </head>
  <body>
    <div class="container">
      <a href="./index.html">Go back</a>

      <div class="timer-controls">
        <input type="text" id="datetime-picker" />
        <button type="button" data-start disabled>Start</button>
      </div>

      <div class="timer">
        <div class="field">
          <span class="value" data-days>00</span>
          <span class="label">Days</span>
        </div>
        <div class="field">
          <span class="value" data-hours>00</span>
          <span class="label">Hours</span>
        </div>
        <div class="field">
          <span class="value" data-minutes>00</span>
          <span class="label">Minutes</span>
        </div>
        <div class="field">
          <span class="value" data-seconds>00</span>
          <span class="label">Seconds</span>
        </div>
      </div>
    </div>
  </body>
</html>
